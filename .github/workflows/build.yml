name: Expo Cloud Build

# Trigger build on push to main or manual workflow dispatch
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Set up Node 18 LTS
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install Expo CLI
      - name: Install Expo CLI
        run: npm install -g expo-cli

      # 4️⃣ Log in to Expo using your token
      - name: Login to Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: expo login --token $EXPO_TOKEN

      # 5️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 6️⃣ Build Android (APK)
      - name: Build Android APK
        run: npx eas build --platform android --profile preview --non-interactive

      # Optional: Build iOS (IPA) if you have Apple developer account
      #- name: Build iOS IPA
      #  run: npx eas build --platform ios --profile preview --non-interactive

      # 7️⃣ Upload Android build artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: |
            ./build/*.apk
